<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Nyl Hair Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/pt-br.global.min.js"></script>
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --gold: #c9a96e;
      --gold-lt: #e6c990;
      --white: #f5f2ed;
      --muted: #888880;
      --danger: #ff6b6b;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── TOPBAR ───────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(10,10,10,.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand img {
      height: 36px;
      width: auto;
      display: block;
    }

    .user-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: .85rem;
      color: var(--muted);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: .5rem 1rem;
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: all .3s;
    }

    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ───────────────────────────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 65px);
    }

    .sidebar {
      width: 220px;
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .tab-button {
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      color: var(--muted);
      text-align: left;
      padding: .9rem 1.5rem;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: all .3s;
    }

    .tab-button:hover { color: var(--white); }

    .tab-button.active {
      color: var(--gold);
      border-left-color: var(--gold);
      background: rgba(201,169,110,.05);
    }

    .main {
      flex: 1;
      padding: 2.5rem;
      overflow-y: auto;
    }

    .view { display: none; }
    .view.active { display: block; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: .3rem;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
    }

    .view > p.subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    /* ── FORMS ───────────────────────────────── */
    form.stack {
      display: grid;
      gap: 0;
      max-width: 520px;
    }

    label {
      display: block;
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
      margin-top: 1rem;
    }

    label:first-child { margin-top: 0; }

    input, select, textarea {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      color: var(--white);
      padding: .8rem 1rem;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 300;
      transition: border-color .3s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: .9rem 1.5rem;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .2em;
      cursor: pointer;
      transition: all .3s;
      font-family: inherit;
      margin-top: 1.5rem;
      justify-self: start;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,169,110,.3);
    }

    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── LIST ITEMS ───────────────────────────── */
    .item-row {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: .75rem;
      font-size: .9rem;
      list-style: none;
    }

    .item-row-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media(max-width: 640px) {
      .item-row-content {
        grid-template-columns: 1fr;
        gap: .75rem;
      }
    }

    .item-row-field {
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .item-row-label {
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .item-row-value {
      font-size: .95rem;
      font-weight: 500;
      color: var(--white);
    }

    .item-row strong { font-weight: 500; }
    .item-row .muted { color: var(--muted); margin-left: .75rem; font-size: .85rem; }
    .item-row .badge {
      display: inline-block;
      background: rgba(201,169,110,.15);
      color: var(--gold);
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      margin-left: .5rem;
    }

    .btn-mini {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .4rem .9rem;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: all .3s;
    }

    .btn-mini:hover { border-color: var(--gold); color: var(--gold); }
    .btn-mini.active { background: var(--gold); color: var(--black); border-color: var(--gold); }

    ul { list-style: none; }

    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 1rem 0;
      font-size: .9rem;
    }

    /* ── TOAST ─────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      font-size: .9rem;
      transform: translateY(200%);
      transition: transform .3s ease;
      z-index: 1000;
      max-width: 360px;
    }

    .toast.show { transform: translateY(0); }
    .toast.success { border-color: var(--gold); color: var(--gold); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── FULLCALENDAR DARK THEME ──────────────────── */
    #calendar { max-width: 1200px; }
    .fc {
      color: var(--white);
      font-family: 'Inter', sans-serif;
    }
    .fc .fc-toolbar-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.3rem;
      font-weight: 700;
    }
    .fc .fc-button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .7rem;
      font-weight: 500;
      padding: .45rem .9rem;
      box-shadow: none;
    }
    .fc .fc-button:hover { background: var(--gold); color: var(--black); border-color: var(--gold); }
    .fc .fc-button:focus { box-shadow: 0 0 0 2px rgba(201,169,110,.3); }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background: var(--gold);
      color: var(--black);
      border-color: var(--gold);
    }
    .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid {
      border-color: var(--border);
    }
    .fc .fc-col-header-cell-cushion,
    .fc .fc-daygrid-day-number,
    .fc .fc-timegrid-slot-label-cushion {
      color: var(--muted);
      text-decoration: none;
      font-size: .8rem;
    }
    .fc-day-today { background: rgba(201,169,110,.06) !important; }
    .fc-event {
      background: var(--gold);
      border: none;
      color: var(--black);
      font-weight: 500;
      font-size: .8rem;
      padding: 2px 4px;
      cursor: pointer;
    }
    .fc-event.status-cancelled { opacity: .35; text-decoration: line-through; }
    .fc-event.status-completed { background: var(--muted); color: var(--black); }
    .fc-list-day-cushion { background: var(--card) !important; }
    .fc-list-event:hover td { background: rgba(201,169,110,.08) !important; }
  </style>
</head>

<body>
  <nav class="topbar">
    <div class="brand">
      <a href="/dashboard"><img src="/logo_nyl_branca.png" alt="Nyl Hair Design" /></a>
    </div>
    <div class="user-meta">
      <span id="user-email"></span>
      <button class="btn-ghost" id="logout-btn">Sair</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <button class="tab-button active" data-tab="agenda">Agenda</button>
      <button class="tab-button" data-tab="novo">Novo Agendamento</button>
      <button class="tab-button" data-tab="servicos">Serviços</button>
      <button class="tab-button" data-tab="horarios">Horários</button>
    </aside>

    <main class="main">
      <section class="view active" data-view="agenda">
        <h1>Agenda</h1>
        <p class="subtitle">Clique em um agendamento para cancelar.</p>
        <div id="calendar"></div>
      </section>

      <section class="view" data-view="novo">
        <h1>Novo Agendamento</h1>
        <p class="subtitle">Cadastre o cliente e reserve um horário.</p>
        <form class="stack" id="booking-form" novalidate>
          <label for="svc-select">Serviço</label>
          <select id="svc-select" required></select>

          <label for="slot-select">Horário disponível</label>
          <select id="slot-select" required disabled>
            <option value="">Selecione um serviço primeiro</option>
          </select>

          <label for="client-name">Nome do cliente</label>
          <input id="client-name" type="text" autocomplete="name" required />

          <label for="client-phone">Telefone (WhatsApp)</label>
          <input id="client-phone" type="tel" placeholder="(42) 99999-9999" required />

          <label for="notes">Observações (opcional)</label>
          <textarea id="notes"></textarea>

          <button type="submit" class="btn-primary">Confirmar Agendamento</button>
        </form>
      </section>

      <section class="view" data-view="servicos">
        <h1>Serviços</h1>
        <p class="subtitle">Ative, desative ou crie novos serviços.</p>
        <ul id="services-list"></ul>

        <h2>Novo Serviço</h2>
        <form class="stack" id="service-form" novalidate>
          <label for="svc-name">Nome</label>
          <input id="svc-name" type="text" required />

          <label for="svc-duration">Duração (minutos)</label>
          <input id="svc-duration" type="number" min="15" step="15" value="30" required />

          <label for="svc-desc">Descrição</label>
          <input id="svc-desc" type="text" />

          <button type="submit" class="btn-primary">Criar Serviço</button>
        </form>
      </section>

      <section class="view" data-view="horarios">
        <h1>Horários Disponíveis</h1>
        <p class="subtitle">Próximos 50 slots. Adicione novos horários abaixo.</p>
        <ul id="slots-list"></ul>

        <h2>Adicionar Horário</h2>
        <form class="stack" id="slot-form" novalidate>
          <label for="slot-svc">Serviço</label>
          <select id="slot-svc" required></select>

          <label for="slot-datetime">Data e hora</label>
          <input id="slot-datetime" type="datetime-local" required />

          <button type="submit" class="btn-primary">Adicionar Horário</button>
        </form>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase, requireAuth, logout } from '/supabase.js';

    const session = await requireAuth();
    if (!session) throw new Error('not authenticated');

    document.getElementById('user-email').textContent = session.user.email;
    document.getElementById('logout-btn').addEventListener('click', logout);

    /* ── TOAST ──────────────────────────── */
    const toast = document.getElementById('toast');
    let toastTimer;
    function notify(kind, text) {
      clearTimeout(toastTimer);
      toast.className = `toast show ${kind}`;
      toast.textContent = text;
      toastTimer = setTimeout(() => toast.className = 'toast', 3500);
    }

    /* ── TABS ──────────────────────────── */
    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelector(`.view[data-view="${btn.dataset.tab}"]`).classList.add('active');
        if (btn.dataset.tab === 'agenda') calendar.updateSize();
      });
    });

    /* ── CALENDAR ──────────────────────── */
    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      locale: 'pt-br',
      initialView: 'timeGridWeek',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek',
      },
      buttonText: {
        today: 'Hoje',
        month: 'Mês',
        week: 'Semana',
        day: 'Dia',
        list: 'Lista',
      },
      slotMinTime: '09:00:00',
      slotMaxTime: '18:00:00',
      allDaySlot: false,
      nowIndicator: true,
      height: 'auto',
      hiddenDays: [0, 1],
      events: async (info, success, failure) => {
        const { data, error } = await supabase
          .from('bookings')
          .select('id, client_name, client_phone, booked_at, status, notes, services(name, duration_minutes)')
          .gte('booked_at', info.startStr)
          .lte('booked_at', info.endStr);
        if (error) { failure(error); return; }
        success((data || []).map(b => {
          const start = new Date(b.booked_at);
          const dur = b.services?.duration_minutes || 30;
          const end = new Date(start.getTime() + dur * 60000);
          return {
            id: b.id,
            title: `${b.services?.name || 'Serviço'} — ${b.client_name}`,
            start: start.toISOString(),
            end: end.toISOString(),
            classNames: [`status-${b.status}`],
            extendedProps: { booking: b },
          };
        }));
      },
      eventClick: async (info) => {
        const b = info.event.extendedProps.booking;
        if (b.status === 'cancelled') return;
        const ok = confirm(
          `${b.services?.name || 'Serviço'}\n` +
          `Cliente: ${b.client_name}\n` +
          `Telefone: ${b.client_phone}\n` +
          `Quando: ${new Date(b.booked_at).toLocaleString('pt-BR')}\n` +
          (b.notes ? `Obs: ${b.notes}\n` : '') +
          `\nDeseja cancelar este agendamento?`
        );
        if (!ok) return;
        const { error } = await supabase.from('bookings').update({ status: 'cancelled' }).eq('id', b.id);
        if (error) notify('error', error.message);
        else { notify('success', 'Agendamento cancelado'); calendar.refetchEvents(); }
      },
    });
    calendar.render();

    /* ── SHARED DATA ────────────────────── */
    async function loadActiveServices() {
      const { data } = await supabase.from('services').select('*').eq('active', true).order('name');
      return data || [];
    }

    async function populateServiceDropdowns() {
      const services = await loadActiveServices();
      const options = '<option value="">Selecione...</option>' +
        services.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      document.getElementById('svc-select').innerHTML = options;
      document.getElementById('slot-svc').innerHTML = options;
    }

    /* ── NEW BOOKING ────────────────────── */
    const svcSelect = document.getElementById('svc-select');
    const slotSelect = document.getElementById('slot-select');

    svcSelect.addEventListener('change', async () => {
      if (!svcSelect.value) {
        slotSelect.innerHTML = '<option value="">Selecione um serviço primeiro</option>';
        slotSelect.disabled = true;
        return;
      }
      slotSelect.innerHTML = '<option>Carregando...</option>';
      slotSelect.disabled = true;
      const { data } = await supabase
        .from('available_slots')
        .select('*')
        .eq('service_id', svcSelect.value)
        .eq('is_booked', false)
        .gte('slot_datetime', new Date().toISOString())
        .order('slot_datetime')
        .limit(200);
      if (!data?.length) {
        slotSelect.innerHTML = '<option value="">Nenhum horário disponível</option>';
        return;
      }
      slotSelect.innerHTML = '<option value="">Selecione...</option>' + data.map(s => {
        const d = new Date(s.slot_datetime);
        const label = d.toLocaleString('pt-BR', {
          weekday: 'short', day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit',
        });
        return `<option value="${s.id}" data-datetime="${s.slot_datetime}">${label}</option>`;
      }).join('');
      slotSelect.disabled = false;
    });

    document.getElementById('booking-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const service_id = svcSelect.value;
      const slot_id = slotSelect.value;
      const booked_at = slotSelect.selectedOptions[0]?.dataset.datetime;
      const client_name = document.getElementById('client-name').value.trim();
      const client_phone = document.getElementById('client-phone').value.trim();
      const notes = document.getElementById('notes').value.trim() || null;

      if (!service_id || !slot_id || !booked_at || !client_name || !client_phone) {
        notify('error', 'Preencha todos os campos obrigatórios.');
        return;
      }

      const { error } = await supabase.from('bookings').insert({
        service_id, slot_id, booked_at, client_name, client_phone, notes,
      });
      if (error) { notify('error', error.message); return; }

      notify('success', 'Agendamento confirmado!');
      e.target.reset();
      slotSelect.innerHTML = '<option value="">Selecione um serviço primeiro</option>';
      slotSelect.disabled = true;
      calendar.refetchEvents();
    });

    /* ── SERVICES TAB ──────────────────── */
    async function renderServices() {
      const { data } = await supabase.from('services').select('*').order('name');
      const list = document.getElementById('services-list');
      if (!data?.length) { list.innerHTML = '<li class="empty">Nenhum serviço cadastrado.</li>'; return; }
      list.innerHTML = data.map(s => `
        <li class="item-row">
          <div class="item-row-content">
            <div class="item-row-field">
              <span class="item-row-label">Serviço</span>
              <span class="item-row-value">${s.name}</span>
            </div>
            <div class="item-row-field">
              <span class="item-row-label">Duração</span>
              <span class="item-row-value">${s.duration_minutes} minutos</span>
            </div>
          </div>
          ${s.description ? `
          <div class="item-row-field">
            <span class="item-row-label">Descrição</span>
            <span class="item-row-value">${s.description}</span>
          </div>
          ` : ''}
          <button class="btn-mini ${s.active ? 'active' : ''}" data-toggle-svc="${s.id}" data-active="${s.active}">
            ${s.active ? 'Ativo' : 'Inativo'}
          </button>
        </li>
      `).join('');
      list.querySelectorAll('[data-toggle-svc]').forEach(b => {
        b.addEventListener('click', async () => {
          const active = b.dataset.active !== 'true';
          const { error } = await supabase.from('services').update({ active }).eq('id', b.dataset.toggleSvc);
          if (error) notify('error', error.message);
          else { await renderServices(); await populateServiceDropdowns(); }
        });
      });
    }

    document.getElementById('service-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('svc-name').value.trim();
      const duration_minutes = parseInt(document.getElementById('svc-duration').value, 10) || 30;
      const description = document.getElementById('svc-desc').value.trim() || null;
      if (!name) { notify('error', 'Informe o nome do serviço.'); return; }
      const { error } = await supabase.from('services').insert({ name, duration_minutes, description });
      if (error) { notify('error', error.message); return; }
      notify('success', 'Serviço criado');
      e.target.reset();
      document.getElementById('svc-duration').value = 30;
      await renderServices();
      await populateServiceDropdowns();
    });

    /* ── SLOTS TAB ──────────────────────── */
    async function renderSlots() {
      const { data } = await supabase
        .from('available_slots')
        .select('*, services(name)')
        .gte('slot_datetime', new Date().toISOString())
        .order('slot_datetime')
        .limit(50);
      const list = document.getElementById('slots-list');
      if (!data?.length) { list.innerHTML = '<li class="empty">Nenhum horário futuro cadastrado.</li>'; return; }
      list.innerHTML = data.map(s => {
        const d = new Date(s.slot_datetime).toLocaleString('pt-BR', {
          weekday: 'short', day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit',
        });
        return `
          <li class="item-row">
            <div class="item-row-content">
              <div class="item-row-field">
                <span class="item-row-label">Horário</span>
                <span class="item-row-value">${d}</span>
              </div>
              <div class="item-row-field">
                <span class="item-row-label">Serviço</span>
                <span class="item-row-value">${s.services?.name || 'Sem serviço'}</span>
              </div>
            </div>
            <div style="display: flex; align-items: center; gap: .75rem;">
              ${s.is_booked ? '<span class="badge">Reservado</span>' : ''}
              ${!s.is_booked ? `<button class="btn-mini" data-del-slot="${s.id}">Remover</button>` : ''}
            </div>
          </li>
        `;
      }).join('');
      list.querySelectorAll('[data-del-slot]').forEach(b => {
        b.addEventListener('click', async () => {
          if (!confirm('Remover este horário?')) return;
          const { error } = await supabase.from('available_slots').delete().eq('id', b.dataset.delSlot);
          if (error) notify('error', error.message);
          else { notify('success', 'Horário removido'); await renderSlots(); }
        });
      });
    }

    document.getElementById('slot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const service_id = document.getElementById('slot-svc').value;
      const raw = document.getElementById('slot-datetime').value;
      if (!service_id || !raw) { notify('error', 'Selecione serviço e horário.'); return; }
      const date = new Date(raw);
      const dow = date.getDay();
      if (dow === 0 || dow === 1) {
        notify('error', 'Não há atendimento aos domingos e segundas.');
        return;
      }
      const offset = new Date().getTimezoneOffset() * 60000;
      const slot_datetime = new Date(date.getTime() - offset).toISOString();
      const { error } = await supabase.from('available_slots').insert({ service_id, slot_datetime });
      if (error) { notify('error', error.message); return; }
      notify('success', 'Horário adicionado');
      e.target.reset();
      await renderSlots();
    });

    /* ── INIT ────────────────────────────── */
    await populateServiceDropdowns();
    await renderServices();
    await renderSlots();
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
